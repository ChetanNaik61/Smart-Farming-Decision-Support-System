<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ಕನ್ನಡ ಕೃಷಿ ಸಹಾಯಕ — Smart Farming DSS</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="shortcut icon" href="/static/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,700;1,300&family=DM+Sans:wght@300;400;500;600&family=Noto+Sans+Kannada:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --soil: #2C1A0E; --earth: #5C3D1E; --clay: #8B5E3C;
    --leaf: #2D5A27; --sprout: #4A7C3F; --grass: #6AAB5E;
    --sun: #E8A825; --wheat: #D4A843;
    --cream: #F5EDD8; --fog: #EDF2E8; --white: #FAFAF7;
    --chat-bg: #F0F4ED;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', 'Noto Sans Kannada', sans-serif;
    background: var(--chat-bg); color: var(--soil);
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }

  /* NAV */
  nav {
    background: var(--leaf); padding: 0.9rem 1.5rem;
    display: flex; align-items: center; gap: 1rem; flex-shrink: 0;
  }
  .nav-back { color: rgba(245,237,216,0.7); text-decoration: none; font-size: 0.85rem; }
  .nav-back:hover { color: var(--cream); }
  .nav-title {
    font-family: 'Fraunces', serif; font-size: 1.1rem; font-weight: 700;
    color: var(--cream); flex: 1;
  }
  .nav-title small { font-family: 'Noto Sans Kannada', sans-serif; font-style: normal; font-size: 0.8rem; opacity: 0.8; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #6BDE6B;
    box-shadow: 0 0 0 3px rgba(107,222,107,0.3);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 3px rgba(107,222,107,0.3); } 50% { box-shadow: 0 0 0 6px rgba(107,222,107,0.1); } }

  /* CHAT AREA */
  .chat-area {
    flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem;
    scroll-behavior: smooth;
  }
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: rgba(74,124,63,0.3); border-radius: 4px; }

  .msg { display: flex; align-items: flex-end; gap: 0.7rem; max-width: 75%; animation: msgIn 0.3s ease; }
  .msg.user { margin-left: auto; flex-direction: row-reverse; }
  .msg.bot { margin-right: auto; }

  .msg-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; flex-shrink: 0;
  }
  .msg.bot .msg-avatar { background: var(--leaf); }
  .msg.user .msg-avatar { background: var(--earth); }

  .msg-bubble {
    padding: 0.9rem 1.2rem; border-radius: 18px; max-width: 100%;
    font-size: 0.95rem; line-height: 1.6;
    font-family: 'Noto Sans Kannada', 'DM Sans', sans-serif;
  }
  .msg.bot .msg-bubble {
    background: var(--white); color: var(--soil);
    border-bottom-left-radius: 4px;
    box-shadow: 0 2px 10px rgba(44,26,14,0.08);
  }
  .msg.user .msg-bubble {
    background: var(--leaf); color: var(--cream);
    border-bottom-right-radius: 4px;
  }

  .msg-time { font-size: 0.7rem; color: var(--clay); margin-top: 0.3rem; opacity: 0.7; }
  .msg.user .msg-time { text-align: right; }

  /* SPEAK BUTTON on bot messages */
  .speak-btn {
    background: rgba(74,124,63,0.1); border: none; cursor: pointer;
    border-radius: 6px; padding: 0.25rem 0.5rem; font-size: 0.75rem;
    color: var(--sprout); margin-top: 0.4rem; display: inline-flex;
    align-items: center; gap: 0.3rem; transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .speak-btn:hover { background: rgba(74,124,63,0.2); }

  /* TYPING INDICATOR */
  .typing-indicator { display: flex; gap: 5px; align-items: center; padding: 1rem 1.2rem; }
  .typing-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--clay);
    animation: bounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-8px); } }

  /* INPUT AREA */
  .input-area {
    background: var(--white); border-top: 1px solid rgba(74,124,63,0.12);
    padding: 1rem 1.2rem; flex-shrink: 0;
  }

  /* QUICK PROMPTS */
  .quick-prompts {
    display: flex; gap: 0.5rem; overflow-x: auto; padding-bottom: 0.8rem;
    scrollbar-width: none;
  }
  .quick-prompts::-webkit-scrollbar { display: none; }
  .quick-btn {
    white-space: nowrap; padding: 0.4rem 0.9rem;
    background: var(--fog); border: 1.5px solid rgba(74,124,63,0.15);
    color: var(--earth); border-radius: 100px; font-size: 0.8rem;
    cursor: pointer; font-family: 'Noto Sans Kannada', 'DM Sans', sans-serif;
    transition: all 0.2s; flex-shrink: 0;
  }
  .quick-btn:hover { background: rgba(74,124,63,0.12); border-color: var(--sprout); color: var(--leaf); }

  .input-row {
    display: flex; gap: 0.7rem; align-items: flex-end;
  }
  textarea#msgInput {
    flex: 1; padding: 0.8rem 1rem;
    border: 1.5px solid rgba(74,124,63,0.2); border-radius: 14px;
    font-size: 0.95rem; font-family: 'Noto Sans Kannada', 'DM Sans', sans-serif;
    background: var(--fog); color: var(--soil); resize: none;
    min-height: 48px; max-height: 120px; line-height: 1.5;
    transition: border-color 0.2s;
  }
  textarea#msgInput:focus { outline: none; border-color: var(--leaf); }

  .mic-btn, .send-btn {
    width: 48px; height: 48px; border-radius: 50%;
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; transition: all 0.2s; flex-shrink: 0;
  }
  .mic-btn {
    background: rgba(74,124,63,0.1); color: var(--leaf);
  }
  .mic-btn:hover { background: rgba(74,124,63,0.2); }
  .mic-btn.listening {
    background: #e74c3c; color: white;
    animation: micPulse 1s infinite;
    box-shadow: 0 0 0 6px rgba(231,76,60,0.2);
  }
  @keyframes micPulse { 0%,100% { box-shadow: 0 0 0 6px rgba(231,76,60,0.2); } 50% { box-shadow: 0 0 0 12px rgba(231,76,60,0.05); } }

  .send-btn {
    background: var(--leaf); color: var(--cream);
    box-shadow: 0 4px 14px rgba(45,90,39,0.3);
  }
  .send-btn:hover { background: var(--sprout); transform: scale(1.05); }

  /* WELCOME */
  .welcome-card {
    background: linear-gradient(135deg, var(--leaf), var(--sprout));
    border-radius: 20px; padding: 1.8rem; color: var(--cream);
    text-align: center; max-width: 480px; margin: 0 auto;
  }
  .welcome-card h2 {
    font-family: 'Noto Sans Kannada', serif; font-size: 1.4rem;
    margin-bottom: 0.5rem;
  }
  .welcome-card p { font-size: 0.88rem; opacity: 0.85; line-height: 1.6; }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .msg { max-width: 90%; }
    body { overflow: hidden; }
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-back">← ಹಿಂದೆ</a>
  <div class="nav-title">
    🌿 ಕೃಷಿ ಸಹಾಯಕ
    <br><small>Smart Farming Voice Assistant</small>
  </div>
  <div class="status-dot"></div>
  <button id="voiceToggleBtn" onclick="toggleVoice()" title="ಧ್ವನಿ ಬದಲಾಯಿಸಿ"
    style="background:rgba(245,237,216,0.15);border:1px solid rgba(245,237,216,0.3);
    color:var(--cream);border-radius:20px;padding:0.3rem 0.8rem;
    font-size:0.78rem;cursor:pointer;font-family:'DM Sans',sans-serif;">
    👩 Sapna
  </button>
</nav>

<div class="chat-area" id="chatArea">
  <div class="welcome-card">
    <h2>🌾 ನಮಸ್ಕಾರ!</h2>
    <p>ನಾನು ನಿಮ್ಮ ಕೃಷಿ ಸಹಾಯಕ. ಬೆಳೆ, ಗೊಬ್ಬರ, ನೀರಾವರಿ ಅಥವಾ ಮಣ್ಣಿನ ಬಗ್ಗೆ ಕನ್ನಡದಲ್ಲಿ ಕೇಳಬಹುದು.<br><br>
    <em>I am your farming assistant. Ask me anything about crops, fertilizers, irrigation, or soil in Kannada.</em></p>
  </div>
</div>

<div class="input-area">
  <div class="quick-prompts">
    <button class="quick-btn" onclick="quickAsk('ಯಾವ ಬೆಳೆ ಉತ್ತಮ?')">ಯಾವ ಬೆಳೆ ಉತ್ತಮ?</button>
    <button class="quick-btn" onclick="quickAsk('ಗೊಬ್ಬರ ಹೇಗೆ ಹಾಕಬೇಕು?')">ಗೊಬ್ಬರ ಹೇಗೆ?</button>
    <button class="quick-btn" onclick="quickAsk('ನೀರಾವರಿ ಪದ್ಧತಿ ತಿಳಿಸಿ')">ನೀರಾವರಿ</button>
    <button class="quick-btn" onclick="quickAsk('ಭತ್ತ ಬೆಳೆಯಲು ಏನು ಬೇಕು?')">ಭತ್ತ ಬೆಳೆ</button>
    <button class="quick-btn" onclick="quickAsk('ಮಣ್ಣಿನ pH ಸರಿಪಡಿಸುವುದು ಹೇಗೆ?')">ಮಣ್ಣು pH</button>
    <button class="quick-btn" onclick="quickAsk('ಕೀಟ ನಿಯಂತ್ರಣ ಹೇಗೆ?')">ಕೀಟ ನಿಯಂತ್ರಣ</button>
    <button class="quick-btn" onclick="quickAsk('ರಾಗಿ ಬೆಳೆಗೆ ಗೊಬ್ಬರ ತಿಳಿಸಿ')">ರಾಗಿ ಗೊಬ್ಬರ</button>
  </div>
  <div class="input-row">
    <button class="mic-btn" id="micBtn" title="ಮಾತಿನ ಮೂಲಕ ಕೇಳಿ">🎤</button>
    <textarea id="msgInput" placeholder="ಇಲ್ಲಿ ಕನ್ನಡದಲ್ಲಿ ಟೈಪ್ ಮಾಡಿ..." rows="1"
      onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendMessage()}"
      oninput="autoResize(this)"></textarea>
    <button class="send-btn" onclick="sendMessage()" title="ಕಳುಹಿಸಿ">➤</button>
  </div>
</div>

<script>
const API_BASE = window.location.origin;
let chatHistory = [];
let isListening = false;
let recognition = null;

// ─── Speech Recognition ───────────────────────
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.lang = 'kn-IN';
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    document.getElementById('msgInput').value = transcript;
    stopListening();
    sendMessage();
  };
  recognition.onerror = () => stopListening();
  recognition.onend = () => stopListening();
}

document.getElementById('micBtn').addEventListener('click', toggleMic);

function toggleMic() {
  if (!recognition) { alert('Speech recognition not supported in this browser. Try Chrome.'); return; }
  if (isListening) stopListening();
  else startListening();
}

function startListening() {
  isListening = true;
  document.getElementById('micBtn').classList.add('listening');
  document.getElementById('micBtn').innerHTML = '⏹️';
  recognition.start();
}

function stopListening() {
  isListening = false;
  document.getElementById('micBtn').classList.remove('listening');
  document.getElementById('micBtn').innerHTML = '🎤';
  if (recognition) try { recognition.stop(); } catch(e){}
}

// ─── Text-to-Speech ───────────────────────────
// Engine: Microsoft Edge Neural TTS via /api/tts backend endpoint
//   female (default) → kn-IN-SapnaNeural
//   male             → kn-IN-GaganNeural
//
// The backend handles chunking, parallel synthesis, and MP3 concatenation.
// Frontend sends the FULL text in one request — no chunking needed here.
// Fallback: Web Speech API if backend is unreachable.

let currentAudio = null;
let ttsVoice = "female";   // "female" | "male"

function speakViaWebSpeech(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const voices = speechSynthesis.getVoices();
  const utt = new SpeechSynthesisUtterance(text);
  const knVoice = voices.find(v => v.lang === 'kn-IN')
    || voices.find(v => v.lang.startsWith('kn'))
    || voices.find(v => v.name.toLowerCase().includes('kannada'));
  if (knVoice) { utt.voice = knVoice; utt.lang = knVoice.lang; }
  else { utt.lang = 'kn-IN'; }
  utt.rate = 0.85;
  speechSynthesis.speak(utt);
}

// Single fetch — backend handles chunking & concatenation
async function fetchTTSAudio(text) {
  const url = `${API_BASE}/api/tts?text=${encodeURIComponent(text)}&voice=${ttsVoice}`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error('tts ' + resp.status);
  return await resp.blob();
}

function speak(text) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  speakWithCallback(text, null);
}

async function speakWithCallback(text, onDone) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  try {
    const blob = await fetchTTSAudio(text);
    const objUrl = URL.createObjectURL(blob);
    currentAudio = new Audio(objUrl);
    currentAudio.onended = () => {
      URL.revokeObjectURL(objUrl);
      currentAudio = null;
      if (onDone) onDone();
    };
    currentAudio.onerror = () => {
      URL.revokeObjectURL(objUrl);
      currentAudio = null;
      speakViaWebSpeech(text);        // fallback
      if (onDone) setTimeout(onDone, 4000);
    };
    currentAudio.play();
  } catch (e) {
    speakViaWebSpeech(text);          // fallback
    if (onDone) setTimeout(onDone, 4000);
  }
}

window.speak = speak;

// ─── Chat ─────────────────────────────────────
const msgStore = {};
let msgIdCounter = 0;
let activeSpeakBtn = null;  // track which button is currently "playing"

function addMessage(role, text) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const time = new Date().toLocaleTimeString('kn-IN', { hour: '2-digit', minute: '2-digit' });

  let speakBtn = '';
  if (role === 'bot') {
    const mid = 'msg_' + (++msgIdCounter);
    msgStore[mid] = text;
    speakBtn = `<br><button class="speak-btn" id="spk_${mid}" onclick="toggleSpeak('${mid}')">🔊 ಓದಿ</button>`;
  }
  
  div.innerHTML = `
    <div class="msg-avatar">${role === 'bot' ? '🌿' : '👨‍🌾'}</div>
    <div>
      <div class="msg-bubble">${text.replace(/\n/g, '<br>')}${speakBtn}</div>
      <div class="msg-time">${time}</div>
    </div>
  `;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function toggleSpeak(mid) {
  const btn = document.getElementById('spk_' + mid);
  // If this button is already playing → stop
  if (activeSpeakBtn === btn) {
    stopAllAudio();
    return;
  }
  // Reset any previous button
  if (activeSpeakBtn) { activeSpeakBtn.textContent = '🔊 ಓದಿ'; activeSpeakBtn.style.background = ''; }
  activeSpeakBtn = btn;
  btn.textContent = '⏹ ನಿಲ್ಲಿಸಿ';
  btn.style.background = 'rgba(192,57,43,0.12)';
  const t = msgStore[mid];
  if (t) speakWithCallback(t, () => {
    btn.textContent = '🔊 ಓದಿ';
    btn.style.background = '';
    activeSpeakBtn = null;
  });
}

function stopAllAudio() {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  if (activeSpeakBtn) { activeSpeakBtn.textContent = '🔊 ಓದಿ'; activeSpeakBtn.style.background = ''; activeSpeakBtn = null; }
}

window.toggleSpeak = toggleSpeak;

function addTyping() {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg bot'; div.id = 'typingIndicator';
  div.innerHTML = `
    <div class="msg-avatar">🌿</div>
    <div class="msg-bubble">
      <div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>
  `;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  
  // Stop any currently playing audio when user sends a new message
  stopAllAudio();

  input.value = ''; autoResize(input);
  addMessage('user', text);
  chatHistory.push({ role: 'user', content: text });
  addTyping();

  try {
    const resp = await fetch(`${API_BASE}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history: chatHistory.slice(-10) })
    });
    const data = await resp.json();
    removeTyping();
    const reply = data.reply || 'ಕ್ಷಮಿಸಿ, ಉತ್ತರ ದೊರೆಯಲಿಲ್ಲ.';
    chatHistory.push({ role: 'assistant', content: reply });
    addMessage('bot', reply);
    // Auto-play via Edge Neural TTS — real Kannada voice
    const lastMid = 'msg_' + msgIdCounter;
    const btn = document.getElementById('spk_' + lastMid);
    if (btn) {
      activeSpeakBtn = btn;
      btn.textContent = '⏹ ನಿಲ್ಲಿಸಿ';
      btn.style.background = 'rgba(192,57,43,0.12)';
    }
    speakWithCallback(reply, () => {
      if (btn) { btn.textContent = '🔊 ಓದಿ'; btn.style.background = ''; }
      activeSpeakBtn = null;
    });
  } catch (err) {
    removeTyping();
    const fallback = 'ಕ್ಷಮಿಸಿ, ಸಂಪರ್ಕ ಸಮಸ್ಯೆ ಇದೆ. ಸರ್ವರ್ ಚಾಲನೆಯಲ್ಲಿದೆಯೇ ಎಂದು ಪರಿಶೀಲಿಸಿ.';
    addMessage('bot', fallback);
  }
}

function quickAsk(q) {
  document.getElementById('msgInput').value = q;
  sendMessage();
}

function toggleVoice() {
  ttsVoice = ttsVoice === 'female' ? 'male' : 'female';
  const btn = document.getElementById('voiceToggleBtn');
  btn.textContent = ttsVoice === 'female' ? '👩 Sapna' : '👨 Gagan';
  stopAllAudio();
}
window.toggleVoice = toggleVoice;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
</script>
</body>
</html>
